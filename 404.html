  .nf {
    min-height: calc(100vh - 120px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    animation: rise 0.6s ease both;
  }

  .nf__code {
    font-family: var(--font-display);
    font-size: 96px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.04em;
    margin: 26px 0 0;
  }
  .nf__code-orange {
    background: linear-gradient(180deg, #F9A05F 0%, #F37B22 55%, #E65C00 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .nf__code-cream {
    color: #F5EFE3;
  }

  .nf__title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 14px 0 0;
    color: #5a4036;
  }

  .nf__text {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    line-height: 1.6;
    color: var(--ink-2);
    margin: 10px 0 0;
    max-width: 320px;
  }

  .nf__actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-top: 26px;
  }

  .nf__btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 18px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: -0.005em;
    transition: all 0.18s;
  }
  .nf__btn:active { transform: scale(0.97); }

  .nf__btn--home {
    background: var(--orange);
    color: #fff;
  }
  .nf__btn--home:hover {
    background: var(--orange-deep);
  }

  .nf__btn--wpp {
    background: rgba(43, 168, 102, 0.12);
    border: 1px solid rgba(43, 168, 102, 0.25);
    color: #1F8C50;
  }
  .nf__btn--wpp:hover {
    background: rgba(43, 168, 102, 0.22);
  }
</style>
